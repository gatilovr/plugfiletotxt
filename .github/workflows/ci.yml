name: Plugin CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  verify-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew :app:test --no-daemon -x instrumentCode -x instrumentTestCode

      - name: Check code formatting
        run: ./gradlew :app:spotlessCheck --no-daemon

      - name: Verify plugin configuration
        run: ./gradlew :app:verifyPluginConfiguration

      - name: Build plugin
        run: ./gradlew :app:buildPlugin
